# Generated by ProfileForge — contribution graph art 🎨
# Reads commit-plan.json (committed next to this file) and creates
# backdated empty commits to paint your contribution graph.
name: ProfileForge contribution art

on:
  workflow_dispatch:
  push:
    paths: [commit-plan.json]

permissions:
  contents: write

jobs:
  paint:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"

      - name: Paint the graph
        run: |
          set -euo pipefail
          count=$(jq length commit-plan.json)
          echo "Executing $count planned commits..."
          for i in $(seq 0 $((count - 1))); do
            date=$(jq -r ".[$i].date" commit-plan.json)
            message=$(jq -r ".[$i].message" commit-plan.json)
            GIT_AUTHOR_DATE="${date}T12:00:00" GIT_COMMITTER_DATE="${date}T12:00:00" \
              git commit --allow-empty -m "$message"
          done
          git push origin HEAD
